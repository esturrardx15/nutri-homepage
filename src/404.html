<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollor">
    <title>Página não encontrada - Nutricionista Mariah Katharine</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>a🥑</text></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body{
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #4e7c2f;
            color: #2d1a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container{
            background: #f2ede0;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            padding: 3rem 2.5rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .emoji { font-size: 4rem; margin-bottom: 1rem; }
        h1 { color: #2d5a1b; font-size: 1.8rem; margin-bottom: 0.5rem; }
        p { color: #555; margin-bottom: 1.5rem; line-height: 1.6; }
        .btn {
            display: inline-block;
            background: #7a4520;
            color: #f2ede0;
            padding: 0.75rem 2rem;
            border-radius: 24px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s, transform 0.2s;
        }
        .btn:hover { background: #9e6030; transform: scale(1.04); }
        @media (prefers-color-scheme: dark) {
            body { background: #1c3a0d; }
            .container {background: #2d1a0a; }
            h1 { color: #b8d98d; }
            p { color: #d4c8b0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🥑</div>
        <h1>Página não encontrada</h1>
        <p>Ops! A página que você está procurando não existe ou foi movida.<br>Que tal voltar para a página inicial?</p>
        <a class="btn" href="/">← Voltar ao Início</a>
    </div>
</body>
</html>
